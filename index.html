<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقابة تكنولوجيا المعلومات والبرمجيات - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .animated-bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: move 25s linear infinite;
            bottom: -150px;
        }

        .animated-bg span:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }

        .animated-bg span:nth-child(2) {
            left: 10%;
            width: 40px;
            height: 40px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .animated-bg span:nth-child(3) {
            left: 70%;
            width: 30px;
            height: 30px;
            animation-delay: 4s;
        }

        .animated-bg span:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 22s;
        }

        .animated-bg span:nth-child(5) {
            left: 65%;
            width: 50px;
            height: 50px;
            animation-delay: 0s;
        }

        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 50px;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
            transition: all 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }

        h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
        }

        .ai-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        label i {
            margin-left: 8px;
            color: #667eea;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover:before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-right: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 9999;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .message-box.success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .message-box.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        .loading-spinner p {
            color: white;
            font-size: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 10px;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-label:hover {
            background: #667eea;
            color: white;
        }

        .security-note {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .security-note i {
            color: #667eea;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="main-container">
        <div id="messageBox" class="message-box"></div>
        
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <p>جاري التحميل...</p>
        </div>

        <!-- بطاقة تسجيل الدخول -->
        <div class="card" id="loginCard">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-users-cog"></i>
                </div>
                <h1>نقابة تكنولوجيا المعلومات والبرمجيات</h1>
                <p class="subtitle">النظام الإداري الذكي مع <span class="ai-badge"><i class="fas fa-robot"></i> ITWS AI</span></p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
            </form>

            <div class="toggle-link">
                <span>ليس لديك حساب؟</span>
                <a onclick="showRegister()">تسجيل جديد</a>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                هذا النظام محمي بتقنيات أمان متقدمة
            </div>
        </div>

        <!-- بطاقة التسجيل -->
        <div class="card" id="registerCard" style="display: none;">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>طلب عضوية النقابة</h1>
                <p class="subtitle">املأ البيانات للتسجيل في النظام</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> الاسم الكامل</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="الاسم كما في البطاقة" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" placeholder="مثال: 01234567890" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> الرقم القومي</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="nationalId" placeholder="الرقم القومي 14 رقم" maxlength="14" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-briefcase"></i> الصفة</label>
                    <select id="position" required>
                        <option value="">اختر الصفة</option>
                        <option value="committee_member">عضو لجنة</option>
                        <option value="branch_member">عضو فرع</option>
                    </select>
                </div>

                <div class="form-group" id="committeeGroup" style="display: none;">
                    <label><i class="fas fa-users"></i> اسم اللجنة</label>
                    <input type="text" id="committeeName" placeholder="اسم اللجنة">
                </div>

                <div class="form-group" id="branchGroup" style="display: none;">
                    <label><i class="fas fa-building"></i> اسم الفرع</label>
                    <input type="text" id="branchName" placeholder="اسم الفرع">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> صفتك في اللجنة/الفرع</label>
                    <select id="memberPosition">
                        <option value="member">عضو</option>
                        <option value="vice">وكيل</option>
                        <option value="secretary">امين عام</option>
                        <option value="secretary_assistant">مساعد امين عام</option>
                        <option value="treasurer">امين صندوق</option>
                        <option value="treasurer_assistant">مساعد امين صندوق</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> المحافظة</label>
                    <select id="governorate" required>
                        <option value="">اختر المحافظة</option>
                        <option value="القاهرة">القاهرة</option>
                        <option value="الجيزة">الجيزة</option>
                        <option value="الإسكندرية">الإسكندرية</option>
                        <option value="الدقهلية">الدقهلية</option>
                        <option value="الشرقية">الشرقية</option>
                        <option value="القليوبية">القليوبية</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-camera"></i> الصورة الشخصية</label>
                    <div class="file-upload">
                        <input type="file" id="profileImage" accept="image/*" required>
                        <div class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            اختر صورة
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-file-pdf"></i> صورة قرار التعيين</label>
                    <div class="file-upload">
                        <input type="file" id="appointmentDoc" accept="image/*,.pdf" required>
                        <div class="file-upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            رفع القرار
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال طلب التسجيل
                </button>
            </form>

            <div class="toggle-link">
                <span>لديك حساب بالفعل؟</span>
                <a onclick="showLogin()">تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaPhRG_1c7Rsu5Ss_MUNqsE18Ky_nyEAA",
            authDomain: "itws-system.firebaseapp.com",
            databaseURL: "https://itws-system-default-rtdb.firebaseio.com",
            projectId: "itws-system",
            storageBucket: "itws-system.firebasestorage.app",
            messagingSenderId: "770452248691",
            appId: "1:770452248691:web:0e94e65e01298b398bb206",
            measurementId: "G-8V5WSYEX0B"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);

        function showMessage(text, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `message-box ${type}`;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
        }

        window.showRegister = function() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
        };

        window.showLogin = function() {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
        };

        document.getElementById('position').addEventListener('change', function(e) {
            const committeeGroup = document.getElementById('committeeGroup');
            const branchGroup = document.getElementById('branchGroup');
            
            if (e.target.value === 'committee_member') {
                committeeGroup.style.display = 'block';
                branchGroup.style.display = 'none';
                document.getElementById('committeeName').required = true;
                document.getElementById('branchName').required = false;
            } else if (e.target.value === 'branch_member') {
                committeeGroup.style.display = 'none';
                branchGroup.style.display = 'block';
                document.getElementById('committeeName').required = false;
                document.getElementById('branchName').required = true;
            } else {
                committeeGroup.style.display = 'none';
                branchGroup.style.display = 'none';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            showLoading(true);

            try {
                const usersRef = ref(database, 'users');
                const snapshot = await get(usersRef);
                
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    let foundUser = null;
                    let userId = null;

                    for (const [id, user] of Object.entries(users)) {
                        if (user.fullName === username || user.username === username) {
                            if (user.password === password || user.nationalId === password) {
                                foundUser = user;
                                userId = id;
                                break;
                            }
                        }
                    }

                    if (foundUser) {
                        await update(ref(database, `users/${userId}`), {
                            lastLogin: new Date().toISOString(),
                            online: true
                        });

                        sessionStorage.setItem('currentUser', JSON.stringify({
                            userId: userId,
                            ...foundUser
                        }));

                        showMessage('تم تسجيل الدخول بنجاح', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        showMessage('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('حدث خطأ في تسجيل الدخول', 'error');
            } finally {
                showLoading(false);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            showLoading(true);

            try {
                const fullName = document.getElementById('fullName').value;
                const phone = document.getElementById('phone').value;
                const nationalId = document.getElementById('nationalId').value;
                const position = document.getElementById('position').value;
                const memberPosition = document.getElementById('memberPosition').value;
                const governorate = document.getElementById('governorate').value;
                
                let committeeName = '';
                let branchName = '';
                
                if (position === 'committee_member') {
                    committeeName = document.getElementById('committeeName').value;
                } else {
                    branchName = document.getElementById('branchName').value;
                }

                const profileImage = document.getElementById('profileImage').files[0];
                const appointmentDoc = document.getElementById('appointmentDoc').files[0];

                if (!profileImage || !appointmentDoc) {
                    showMessage('يرجى رفع جميع الملفات المطلوبة', 'error');
                    showLoading(false);
                    return;
                }

                const imageRef = storageRef(storage, `profiles/${Date.now()}_${profileImage.name}`);
                await uploadBytes(imageRef, profileImage);
                const imageUrl = await getDownloadURL(imageRef);

                const docRef = storageRef(storage, `appointments/${Date.now()}_${appointmentDoc.name}`);
                await uploadBytes(docRef, appointmentDoc);
                const docUrl = await getDownloadURL(docRef);

                const requestData = {
                    fullName,
                    phone,
                    nationalId,
                    position,
                    memberPosition,
                    governorate,
                    committeeName: committeeName || null,
                    branchName: branchName || null,
                    profileImage: imageUrl,
                    appointmentDoc: docUrl,
                    status: 'pending',
                    requestDate: new Date().toISOString(),
                    trackingNumber: await generateTrackingNumber('MBR')
                };

                const requestsRef = ref(database, 'pending_requests');
                const newRequestRef = push(requestsRef);
                await set(newRequestRef, requestData);

                showMessage('تم إرسال طلبك بنجاح، بانتظار مراجعة النقيب', 'success');
                
                setTimeout(() => {
                    showLogin();
                    document.getElementById('registerForm').reset();
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showMessage('حدث خطأ في إرسال الطلب', 'error');
            } finally {
                showLoading(false);
            }
        });

        async function generateTrackingNumber(prefix) {
            const year = new Date().getFullYear();
            const counterRef = ref(database, `counters/${prefix}_${year}`);
            const snapshot = await get(counterRef);
            const currentCount = snapshot.exists() ? snapshot.val() : 0;
            const newCount = currentCount + 1;
            await set(counterRef, newCount);
            
            const paddedNumber = newCount.toString().padStart(4, '0');
            return `${prefix}-${paddedNumber}-${year}`;
        }

        async function checkAndCreatePresident() {
            const presidentRef = ref(database, 'users/president_001');
            const snapshot = await get(presidentRef);
            
            if (!snapshot.exists()) {
                const presidentData = {
                    userId: 'president_001',
                    username: 'المهندس / محمود جميل',
                    fullName: 'محمود جميل',
                    password: '30010250202679',
                    nationalId: '30010250202679',
                    role: 'president',
                    title: 'النقيب العام',
                    phone: '01234567890',
                    governorate: 'القاهرة',
                    profileImage: 'default-president.png',
                    status: 'active',
                    online: false,
                    lastLogin: null,
                    permissions: {
                        all: true,
                        manageSystem: true,
                        manageITWSAI: true
                    },
                    createdAt: new Date().toISOString()
                };
                
                await set(presidentRef, presidentData);
                console.log('✅ تم إنشاء النقيب العام');
            }
        }

        checkAndCreatePresident();
